<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libtracker</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="wrapper">
        <button id="open-modal" command="show-modal" commandfor="add-book">Add <br>book</button>
        <dialog id="add-book">
            <form>
                <p>All fields are required</p>
                <label for="title">
                    Title:
                    <input type="text" id="title" required>
                </label>
                <label for="author">
                    Author:
                    <input type="text" id="author" required>
                </label>
                <label for="publisher">
                    Publisher:
                    <input type="text" id="publisher" required>
                </label>
                <label for="year-of-publication">
                    Year of Publication:
                    <input type="number" id="year-of-publication"  required>
                </label>
                <label for="pages">
                    Pages:
                    <input type="number" id="pages" required>
                </label>
                <label for="read-status">
                    Have you read this book?
                    <input type="radio" id="read-status" required>
                </label>
                <button type="button" command="close" commandfor="add-book">
                    Add book
                </button>
            </form>
        </dialog>
    </div>
    <script src="./script.js"></script>
</body>
</html>
